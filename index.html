<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wassmans Familjeapp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#4a90d9;--blue2:#357abd;--accent:#e8f4fd;
  --bg:#f5f7fa;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;
  --border:#e0e6ed;--red:#e74c3c;--green:#27ae60;--orange:#f39c12;
}
html,body{width:100%;overflow-x:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}

/* HEADER */
.hdr{background:var(--blue);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hdr h1{font-size:1.2rem;font-weight:700;}
.hdr p{font-size:.72rem;opacity:.85;margin-top:2px;}

/* NAV */
.nav{display:flex;background:#fff;border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:50;box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.nb{flex:1;padding:8px 2px 6px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.6rem;color:var(--muted);}
.nb.active{color:var(--blue);}
.nb .ic{font-size:1.3rem;}

/* CONTENT */
.content{padding:14px;padding-bottom:76px;}
.tab{display:none;}.tab.active{display:block;}

/* CARD */
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:1rem;color:var(--text);}
.cal-nav button:active{background:var(--accent);}
.cal-hd{font-size:1rem;font-weight:700;text-align:center;}
.cal-hy{font-size:.72rem;color:var(--muted);text-align:center;}
.cal-grid{display:grid;grid-template-columns:20px repeat(7,1fr);gap:1px;}
.wn{font-size:.55rem;color:#bbb;display:flex;align-items:center;justify-content:center;background:#f8f9fa;border-radius:3px;}
.ch{text-align:center;font-size:.6rem;font-weight:700;padding:3px 0;color:var(--muted);}
.ch.r{color:var(--red);}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;position:relative;transition:background .15s;}
.cd:active{background:var(--accent);}
.cd.ot{opacity:.28;cursor:default;}
.cd.he::after{content:'';width:4px;height:4px;background:var(--blue);border-radius:50%;position:absolute;bottom:2px;}
.dn{font-size:.75rem;font-weight:500;line-height:1;}
.dn.r{color:var(--red);font-weight:700;}
.dn.td{background:var(--blue);color:#fff!important;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;}

/* UPCOMING */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-t{font-size:.95rem;font-weight:700;}
.up-item{display:flex;gap:10px;padding:10px;background:var(--accent);border-radius:8px;margin-bottom:6px;}
.up-date{background:var(--blue);color:#fff;border-radius:8px;padding:4px 7px;text-align:center;min-width:40px;flex-shrink:0;}
.up-d{font-size:1.1rem;font-weight:700;line-height:1;}
.up-m{font-size:.55rem;text-transform:uppercase;}
.up-info{flex:1;min-width:0;}
.up-info strong{font-size:.85rem;display:block;}
.up-info span{font-size:.72rem;color:var(--muted);}
.abadge{display:inline-block;background:#fff3cd;color:#856404;border-radius:4px;padding:1px 4px;font-size:.65rem;margin-right:2px;margin-top:2px;}
.rbadge{display:inline-block;background:#e8f8e8;color:var(--green);border-radius:4px;padding:1px 5px;font-size:.65rem;}
.hbadge{display:inline-block;background:#fde8e8;color:var(--red);border-radius:4px;padding:2px 7px;font-size:.75rem;margin-bottom:8px;}

/* OVERLAY / MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;}
.ov.open{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto;overflow-x:hidden;}
.mc{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;}
.mh{font-size:.95rem;font-weight:700;margin-bottom:2px;padding-right:28px;}
.ms{font-size:.75rem;color:var(--muted);margin-bottom:14px;}

/* NAME OVERLAY */
.nov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
.nov.open{display:flex;}
.nbox{background:#fff;border-radius:18px;padding:24px 20px;width:88%;max-width:340px;text-align:center;}
.nbox h2{font-size:1.2rem;margin-bottom:6px;}
.nbox p{font-size:.85rem;color:var(--muted);margin-bottom:16px;}

/* NOTIF */
.notif{display:none;position:fixed;top:66px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;border-radius:10px;padding:10px 14px;font-size:.82rem;z-index:150;max-width:90%;width:440px;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.notif.show{display:block;}
.notif-t{font-weight:700;margin-bottom:3px;}
.notif-c{float:right;background:none;border:none;color:#fff;cursor:pointer;font-size:1rem;margin-top:-2px;}
.ni{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.15);}.ni:last-child{border-bottom:none;}

/* EVENT ITEMS */
.ev-item{background:var(--accent);border-left:3px solid var(--blue);border-radius:6px;padding:9px 10px;margin-bottom:7px;position:relative;}
.ev-t{font-weight:600;font-size:.87rem;padding-right:55px;}
.ev-m{font-size:.72rem;color:var(--muted);margin-top:2px;}
.ev-a{font-size:.72rem;color:var(--blue);margin-top:3px;}
.ev-act{display:flex;gap:4px;position:absolute;top:7px;right:6px;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:2px 4px;}

/* FORM */
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:3px;}
input[type=text],input[type=time],textarea,select{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;
  font-size:.88rem;font-family:inherit;outline:none;transition:border .2s;
  -webkit-appearance:none;appearance:none;
}
input:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:65px;}
.time-row{display:flex;gap:8px;align-items:center;}
.time-row input{flex:1;}
.time-sep{color:var(--muted);font-size:.85rem;flex-shrink:0;}
.adt{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:.83rem;font-weight:600;cursor:pointer;}
.adt input{width:17px;height:17px;accent-color:var(--blue);flex-shrink:0;}
.cg{display:flex;flex-direction:column;gap:5px;}
.cl{display:flex;align-items:center;gap:8px;font-size:.83rem;cursor:pointer;}
.cl input[type=checkbox],.cl input[type=radio]{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:9px;border:none;font-size:.87rem;font-weight:600;cursor:pointer;}
.btn-p{background:var(--blue);color:#fff;}.btn-p:active{background:var(--blue2);}
.btn-s{background:var(--border);color:var(--text);}
.btn-row{display:flex;gap:8px;margin-top:6px;}.btn-row .btn{flex:1;}
.btn-w{width:100%;}

/* LISTS */
.row-in{display:flex;gap:8px;margin-bottom:10px;}
.row-in input{flex:1;}
.row-in .btn{padding:9px 14px;flex-shrink:0;}
.shop-item{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--card);border-radius:8px;margin-bottom:5px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.shop-item.ck{opacity:.5;}.shop-item.ck .si{text-decoration:line-through;}
.shop-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);flex-shrink:0;}
.si{font-size:.87rem;}.im{font-size:.68rem;color:#bbb;}
.ia{display:flex;gap:2px;flex-shrink:0;}
.mb{background:none;border:none;cursor:pointer;padding:3px 4px;font-size:.95rem;color:var(--muted);}
.mb:disabled{opacity:.2;cursor:default;}
.eb{background:none;border:none;cursor:pointer;padding:3px 4px;font-size:.85rem;color:var(--blue);}
.db{background:none;border:none;cursor:pointer;padding:3px 4px;font-size:.85rem;color:var(--red);}
.note-card{background:var(--card);border-radius:10px;padding:13px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:3px solid var(--orange);position:relative;}
.note-card h4{font-size:.9rem;font-weight:700;margin-bottom:3px;padding-right:54px;}
.note-card p{font-size:.82rem;color:var(--muted);white-space:pre-wrap;}
.nd{font-size:.67rem;color:#bbb;margin-top:5px;}
.na{position:absolute;top:9px;right:9px;display:flex;gap:3px;}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;background:var(--card);border-radius:8px;margin-bottom:5px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.cn{background:var(--blue);color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.chk-item.done .cn{background:var(--green);}
.chk-item.done .ct{text-decoration:line-through;opacity:.6;}
.ct-w{flex:1;min-width:0;}
.ct{font-size:.87rem;font-weight:600;}
.cn2{font-size:.75rem;color:var(--muted);margin-top:2px;}
.chk-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);flex-shrink:0;margin-top:2px;}
.empty{text-align:center;color:var(--muted);padding:28px 16px;font-size:.87rem;}
.empty .em{font-size:2.2rem;display:block;margin-bottom:7px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.fl{font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--blue);}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏠 Wassmans Familjeapp</h1>
  <p id="hdr-date"></p>
</div>

<div class="content">

  <!-- KALENDER -->
  <div class="tab active" id="tab-calendar">
    <div class="card">
      <div class="cal-nav">
        <button onclick="chM(-1)">‹</button>
        <div><div class="cal-hd" id="cal-title"></div><div class="cal-hy" id="cal-year"></div></div>
        <button onclick="chM(1)">›</button>
      </div>
      <div id="cal-grid"></div>
    </div>
    <div class="sec-hdr">
      <div class="sec-t">📌 Kommande händelser</div>
      <button class="btn btn-s" style="font-size:.72rem;padding:5px 10px" onclick="exportICal()">📥 Exportera</button>
    </div>
    <div id="upcoming"></div>
  </div>

  <!-- INKÖPSLISTA -->
  <div class="tab" id="tab-shop">
    <div class="sec-t" style="margin-bottom:12px">🛒 Inköpslista</div>
    <div class="card">
      <div class="fg"><label>Vara *</label><input type="text" id="sh-in" placeholder="T.ex. Mjölk" onkeydown="if(event.key==='Enter')addShop()"></div>
      <div class="fg"><label>Beskrivning (valfri)</label><input type="text" id="sh-desc" placeholder="T.ex. Laktosfri, 1 liter"></div>
      <button class="btn btn-p btn-w" onclick="addShop()">+ Lägg till</button>
    </div>
    <div id="shop-list"></div>
    <button class="btn btn-s btn-w" style="margin-top:6px" onclick="clearShop()">Rensa ibockade</button>
  </div>

  <!-- CHECKLISTA -->
  <div class="tab" id="tab-check">
    <div class="sec-t" style="margin-bottom:12px">✅ Checklista</div>
    <div class="card">
      <div class="fg"><label>Punkt *</label><input type="text" id="ck-in" placeholder="Vad ska göras?"></div>
      <div class="fg"><label>Anteckning (valfri)</label><input type="text" id="ck-note" placeholder="Extra info..."></div>
      <button class="btn btn-p btn-w" onclick="addChk()">+ Lägg till</button>
    </div>
    <div class="divider"></div>
    <div id="check-list"></div>
  </div>

  <!-- ANTECKNINGAR -->
  <div class="tab" id="tab-notes">
    <div class="sec-t" style="margin-bottom:12px">📝 Anteckningar</div>
    <div class="card">
      <div class="fg"><label>Rubrik</label><input type="text" id="no-title" placeholder="Rubrik..."></div>
      <div class="fg"><label>Text</label><textarea id="no-text" placeholder="Skriv din anteckning..."></textarea></div>
      <button class="btn btn-p btn-w" onclick="addNote()">Spara anteckning</button>
    </div>
    <div class="divider"></div>
    <div id="notes-list"></div>
  </div>

</div>

<nav class="nav">
  <button class="nb active" onclick="showTab('calendar',this)"><span class="ic">📅</span>Kalender</button>
  <button class="nb" onclick="showTab('shop',this)"><span class="ic">🛒</span>Inköpslista</button>
  <button class="nb" onclick="showTab('check',this)"><span class="ic">✅</span>Checklista</button>
  <button class="nb" onclick="showTab('notes',this)"><span class="ic">📝</span>Anteckningar</button>
</nav>

<!-- HÄNDELSE MODAL -->
<div class="ov" id="ev-ov">
  <div class="modal">
    <button class="mc" onclick="closeEv()">×</button>
    <div class="mh" id="ev-mh"></div>
    <div class="ms" id="ev-ms"></div>
    <div id="ev-list"></div>
    <div class="divider"></div>
    <div class="fl" id="ev-fl">➕ Lägg till händelse</div>
    <div class="fg"><label>Händelse / titel *</label><input type="text" id="ev-ti" placeholder="T.ex. Spelkväll"></div>
    <div class="fg"><label>Anteckning (valfri)</label><input type="text" id="ev-no" placeholder="Extra info..."></div>
    <div class="fg">
      <label class="adt"><input type="checkbox" id="ev-ad" checked onchange="togAD()"> 📅 Hela dagen</label>
      <div id="ev-tr" class="time-row" style="display:none">
        <input type="time" id="ev-ts" value="08:00">
        <span class="time-sep">–</span>
        <input type="time" id="ev-te" value="09:00">
      </div>
    </div>
    <div class="fg">
      <label>Alarm påminnelser</label>
      <div class="cg">
        <label class="cl"><input type="checkbox" id="a14"> 2 veckor innan</label>
        <label class="cl"><input type="checkbox" id="a7"> 1 vecka innan</label>
        <label class="cl"><input type="checkbox" id="a3"> 3 dagar innan</label>
        <label class="cl"><input type="checkbox" id="a1"> Dagen innan</label>
      </div>
    </div>
    <div class="fg">
      <label>🔁 Återkommande</label>
      <div class="cg">
        <label class="cl"><input type="radio" name="rec" value="none" checked> Ingen upprepning</label>
        <label class="cl"><input type="radio" name="rec" value="weekly"> Varje vecka</label>
        <label class="cl"><input type="radio" name="rec" value="biweekly"> Varannan vecka</label>
        <label class="cl"><input type="radio" name="rec" value="yearly"> 🎂 Varje år</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeEv()">Avbryt</button>
      <button class="btn btn-p" id="ev-sb" onclick="saveEv()">Spara händelse</button>
    </div>
  </div>
</div>

<!-- REDIGERA MODAL -->
<div class="ov" id="ed-ov">
  <div class="modal">
    <button class="mc" onclick="closeEd()">×</button>
    <div class="mh" id="ed-mh" style="margin-bottom:14px"></div>
    <div id="ed-fields"></div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeEd()">Avbryt</button>
      <button class="btn btn-p" onclick="saveEd()">Spara ändringar</button>
    </div>
  </div>
</div>

<!-- NAMN MODAL -->
<div class="nov" id="nm-ov">
  <div class="nbox">
    <h2>👋 Välkommen!</h2>
    <p>Vad heter du? Ditt namn visas när du lägger till saker.</p>
    <input type="text" id="nm-in" placeholder="Ditt namn..." maxlength="30" style="margin-bottom:14px">
    <button class="btn btn-p btn-w" onclick="saveName()">Spara namn</button>
  </div>
</div>

<!-- NOTIS -->
<div class="notif" id="notif">
  <button class="notif-c" onclick="document.getElementById('notif').classList.remove('show')">×</button>
  <div class="notif-t">🔔 Påminnelser</div>
  <div id="notif-body"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase,ref,onValue,push,remove,set,update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyB-uYeQ0z86IsiDnvzBQsvWbrXvdFuXn2s",
  authDomain:"wassmans.firebaseapp.com",projectId:"wassmans",
  storageBucket:"wassmans.firebasestorage.app",messagingSenderId:"430448265249",
  appId:"1:430448265249:web:f65bd162fbfcaa51617b60",
  databaseURL:"https://wassmans-default-rtdb.europe-west1.firebasedatabase.app"
}));

// ── helpers ──
const p2=n=>String(n).padStart(2,'0');
const dk=(y,m,d)=>`${y}-${p2(m+1)}-${p2(d)}`;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function wn(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=u.getUTCDay()||7; u.setUTCDate(u.getUTCDate()+4-day);
  return Math.ceil((((u-new Date(Date.UTC(u.getUTCFullYear(),0,1)))/86400000)+1)/7);
}
const MO=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
const DA=['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
const FH={'01-01':'Nyårsdagen','01-06':'Trettondedag jul','05-01':'Första maj','06-06':'Nationaldagen','12-24':'Julafton','12-25':'Juldagen','12-26':'Annandag jul','12-31':'Nyårsafton'};

function easter(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
    mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,dy);
}
function hols(y){
  const h={};
  Object.entries(FH).forEach(([k,v])=>h[`${y}-${k}`]=v);
  const e=easter(y);
  const add=(b,o,n)=>{const d=new Date(b);d.setDate(d.getDate()+o);h[`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`]=n;};
  add(e,-3,'Skärtorsdagen');add(e,-2,'Långfredagen');add(e,-1,'Påskafton');
  add(e,0,'Påskdagen');add(e,1,'Annandag påsk');add(e,39,'Kristi himmelsfärd');add(e,49,'Pingstdagen');
  const ms=new Date(y,5,19);while(ms.getDay()!==5)ms.setDate(ms.getDate()+1);
  const ma=new Date(ms);ma.setDate(ms.getDate()-1);
  h[`${y}-${p2(ma.getMonth()+1)}-${p2(ma.getDate())}`]='Midsommarafton';
  h[`${y}-${p2(ms.getMonth()+1)}-${p2(ms.getDate())}`]='Midsommardagen';
  const ah=new Date(y,9,31);while(ah.getDay()!==6)ah.setDate(ah.getDate()+1);
  h[`${ah.getFullYear()}-${p2(ah.getMonth()+1)}-${p2(ah.getDate())}`]='Alla helgons dag';
  return h;
}
function isRed(d,h){return d.getDay()===0||!!h[dk(d.getFullYear(),d.getMonth(),d.getDate())];}

// ── state ──
const today=new Date();
let curY=today.getFullYear(),curM=today.getMonth();
let selDate=null,calEvs={},shopItems={},chkItems={};
let edEvKey=null,edEvId=null,edCtx=null;
let userName=localStorage.getItem('wass_name')||'';

document.getElementById('hdr-date').textContent=today.toLocaleDateString('sv-SE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
if(!userName)document.getElementById('nm-ov').classList.add('open');

// ── name ──
window.saveName=()=>{
  const n=document.getElementById('nm-in').value.trim();if(!n)return;
  userName=n;localStorage.setItem('wass_name',n);
  document.getElementById('nm-ov').classList.remove('open');
};

// ── calendar ──
function renderCal(){
  document.getElementById('cal-title').textContent=MO[curM];
  document.getElementById('cal-year').textContent=curY;
  const h=hols(curY);
  const first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  let html='<div class="cal-grid">';
  html+='<div class="wn" style="background:none"></div>';
  DA.forEach((d,i)=>html+=`<div class="ch${i===6?' r':''}">${d}</div>`);
  const cells=[];
  const pl=new Date(curY,curM,0).getDate();
  for(let i=0;i<dow;i++)cells.push({date:new Date(curY,curM-1,pl-dow+1+i),cur:false});
  for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(curY,curM,d),cur:true});
  while(cells.length%7!==0)cells.push({date:new Date(curY,curM+1,cells.length-dow-last.getDate()+1),cur:false});
  for(let i=0;i<cells.length;i++){
    if(i%7===0){const r=cells.slice(i,i+7).find(c=>c.cur)||cells[i];html+=`<div class="wn">v${wn(r.date)}</div>`;}
    const{date,cur}=cells[i];
    const key=dk(date.getFullYear(),date.getMonth(),date.getDate());
    const isTd=cur&&date.getDate()===today.getDate()&&curM===today.getMonth()&&curY===today.getFullYear();
    const red=isRed(date,hols(date.getFullYear()));
    const hasEv=cur&&calEvs[key]&&Object.keys(calEvs[key]).length>0;
    const hasRec=cur&&!hasEv&&Object.entries(calEvs).some(([k,es])=>{
      const[ey,em,ed]=k.split('-').map(Number);
      return Object.values(es).some(ev=>{
        const b=new Date(ey,em-1,ed);
        if(ev.recurring)return date.getMonth()===em-1&&date.getDate()===ed;
        if(ev.recurWeekly){const df=Math.round((date-b)/86400000);return df>=0&&df%7===0;}
        if(ev.recurBiweekly){const df=Math.round((date-b)/86400000);return df>=0&&df%14===0;}
        return false;
      });
    });
    html+=`<div class="cd${cur?'':' ot'}${(hasEv||hasRec)?' he':''}"${cur?` onclick="openEv('${key}')"`:''}>`
         +`<span class="${isTd?'dn td':`dn${red?' r':''}`}">${date.getDate()}</span></div>`;
  }
  html+='</div>';
  document.getElementById('cal-grid').innerHTML=html;
  renderUpcoming();
}
window.chM=d=>{curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}renderCal();};

function renderUpcoming(){
  const el=document.getElementById('upcoming');
  const now=new Date();now.setHours(0,0,0,0);
  const items=[];
  Object.entries(calEvs).forEach(([key,es])=>{
    const[y,m,d]=key.split('-').map(Number);
    Object.entries(es).forEach(([id,ev])=>{
      const b=new Date(y,m-1,d);
      if(ev.recurWeekly||ev.recurBiweekly){
        const s=ev.recurWeekly?7:14;let c=new Date(b);while(c<now)c.setDate(c.getDate()+s);
        for(let i=0;i<6;i++){items.push({date:new Date(c),ev});c.setDate(c.getDate()+s);}
      } else if(ev.recurring){
        [curY,curY+1].forEach(yr=>{const r=new Date(yr,m-1,d);if(r>=now)items.push({date:r,ev});});
      } else if(b>=now)items.push({date:b,ev});
    });
  });
  items.sort((a,b)=>a.date-b.date);
  const seen=new Set();
  const uniq=items.filter(u=>{const k=`${u.ev.title}-${u.date.toDateString()}`;if(seen.has(k))return false;seen.add(k);return true;});
  if(!uniq.length){el.innerHTML='<div class="empty"><span class="em">📭</span>Inga kommande händelser</div>';return;}
  el.innerHTML=uniq.slice(0,5).map(({date,ev})=>{
    const diff=Math.round((date-now)/86400000);
    const ds=diff===0?'Idag!':diff===1?'Imorgon':`Om ${diff} dagar`;
    const al=[];if(ev.alarm14)al.push('2v');if(ev.alarm7)al.push('1v');if(ev.alarm3)al.push('3d');if(ev.alarm1)al.push('1d');
    const tag=ev.recurring?'🎂':ev.recurWeekly||ev.recurBiweekly?'🔁':'';
    const ts=ev.allDay===false&&ev.startTime?` · 🕐${ev.startTime}${ev.endTime?'–'+ev.endTime:''}` :'';
    return`<div class="up-item"><div class="up-date"><div class="up-d">${date.getDate()}</div><div class="up-m">${MO[date.getMonth()].slice(0,3)}</div></div><div class="up-info"><strong>${esc(ev.title)} ${tag}</strong><span>${esc(ev.note||'')}${ts}${ev.addedBy?' · 👤 '+esc(ev.addedBy):''}</span><div><span style="font-size:.68rem;color:var(--blue)">${ds}</span> ${al.map(a=>`<span class="abadge">⏰${a}</span>`).join('')}</div></div></div>`;
  }).join('');
}

function checkNotifs(evs){
  const now=new Date();now.setHours(0,0,0,0);
  const al=[];
  Object.entries(evs).forEach(([key,em])=>{
    const[y,m,d]=key.split('-').map(Number);
    Object.values(em).forEach(ev=>{
      const dates=[],b=new Date(y,m-1,d);
      if(ev.recurWeekly||ev.recurBiweekly){const s=ev.recurWeekly?7:14;let c=new Date(b);while(c<now)c.setDate(c.getDate()+s);for(let i=0;i<2;i++){dates.push(new Date(c));c.setDate(c.getDate()+s);}}
      else if(ev.recurring){[now.getFullYear(),now.getFullYear()+1].forEach(yr=>dates.push(new Date(yr,m-1,d)));}
      else dates.push(b);
      dates.forEach(date=>{
        const df=Math.round((date-now)/86400000);
        if(ev.alarm14&&df===14)al.push(`📅 Om 2 veckor: ${ev.title}`);
        if(ev.alarm7&&df===7)al.push(`📅 Om 1 vecka: ${ev.title}`);
        if(ev.alarm3&&df===3)al.push(`📅 Om 3 dagar: ${ev.title}`);
        if(ev.alarm1&&df===1)al.push(`📅 Imorgon: ${ev.title}`);
        if(df===0)al.push(`🎉 Idag: ${ev.title}`);
      });
    });
  });
  const u=[...new Set(al)];
  if(u.length){document.getElementById('notif-body').innerHTML=u.map(a=>`<div class="ni">${esc(a)}</div>`).join('');document.getElementById('notif').classList.add('show');}
}

function renderEvList(key){

  });
  el.innerHTML=sorted.map(({id,ev})=>{

    const ts=ev.allDay===false&&ev.startTime?`<span style="font-size:.72rem;color:var(--blue)">🕐 ${ev.startTime}${ev.endTime?'–'+ev.endTime:''}</span> `:'<span style="font-size:.72rem;color:var(--muted)">📅 Hela dagen</span> ';

};

function moveItem(path,id,dir,all){
  const s=Object.entries(all).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const i=s.findIndex(([k])=>k===id),j=i+dir;
  if(j<0||j>=s.length)return;
  const oa=s[i][1].order||i,ob=s[j][1].order||j;
  set(ref(db,`${path}/${s[i][0]}/order`),ob);
  set(ref(db,`${path}/${s[j][0]}/order`),oa);
}

window.exportICal=()=>{
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wassmans//SV','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  const n=new Date();
  const st=`${n.getFullYear()}${p2(n.getMonth()+1)}${p2(n.getDate())}T${p2(n.getHours())}${p2(n.getMinutes())}${p2(n.getSeconds())}Z`;
  const fd=d=>`${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;
  Object.entries(calEvs).forEach(([key,es])=>{
    const[y,m,d]=key.split('-').map(Number);const b=new Date(y,m-1,d);
    Object.entries(es).forEach(([id,ev])=>{
      const ae=(date,extra=[])=>{
        L.push('BEGIN:VEVENT',`UID:${id}-${fd(date)}@wassmans`,`DTSTAMP:${st}`);
        if(ev.allDay===false&&ev.startTime){L.push(`DTSTART:${fd(date)}T${ev.startTime.replace(':','')}00`,`DTEND:${fd(date)}T${(ev.endTime||ev.startTime).replace(':','')}00`);}
        else{L.push(`DTSTART;VALUE=DATE:${fd(date)}`,`DTEND;VALUE=DATE:${fd(new Date(date.getFullYear(),date.getMonth(),date.getDate()+1))}`);}
        L.push(`SUMMARY:${ev.title}`);if(ev.note)L.push(`DESCRIPTION:${ev.note}`);
        extra.forEach(l=>L.push(l));
        if(ev.alarm1)L.push('BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY',`DESCRIPTION:Imorgon: ${ev.title}`,'END:VALARM');
        if(ev.alarm3)L.push('BEGIN:VALARM','TRIGGER:-P3D','ACTION:DISPLAY',`DESCRIPTION:Om 3 dagar: ${ev.title}`,'END:VALARM');
        if(ev.alarm7)L.push('BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY',`DESCRIPTION:Om 1 vecka: ${ev.title}`,'END:VALARM');
        if(ev.alarm14)L.push('BEGIN:VALARM','TRIGGER:-P14D','ACTION:DISPLAY',`DESCRIPTION:Om 2 veckor: ${ev.title}`,'END:VALARM');
        L.push('END:VEVENT');
      };
      if(ev.recurring)ae(b,['RRULE:FREQ=YEARLY']);
      else if(ev.recurWeekly)ae(b,['RRULE:FREQ=WEEKLY']);
      else if(ev.recurBiweekly)ae(b,['RRULE:FREQ=WEEKLY;INTERVAL=2']);
      else ae(b);
    });
  });
  L.push('END:VCALENDAR');
  const url=URL.createObjectURL(new Blob([L.join('\r\n')],{type:'text/calendar;charset=utf-8'}));
  const a=document.createElement('a');a.href=url;a.download='wassmans-kalender.ics';a.click();URL.revokeObjectURL(url);
};

// ── tabs ──
window.showTab=(name,btn)=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
};
</script>
